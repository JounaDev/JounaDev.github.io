<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6b21a8">
<title>Youstin — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    width: 100vw;
    min-height: 100vh;
    overflow: hidden;
    background: #120820;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── FONDO ANIMADO ── */
  .bg {
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(ellipse 90% 80% at 75% 10%,  rgba(107,33,168,0.7)  0%, transparent 65%),
      radial-gradient(ellipse 80% 70% at 15% 40%,  rgba(45,10,78,0.6)    0%, transparent 65%),
      radial-gradient(ellipse 75% 65% at 25% 85%,  rgba(127,29,29,0.55)  0%, transparent 65%),
      radial-gradient(ellipse 85% 75% at 65% 90%,  rgba(59,7,100,0.65)   0%, transparent 65%),
      radial-gradient(ellipse 60% 60% at 50% 50%,  rgba(30,5,55,0.4)     0%, transparent 70%);
    background-color: #120820;
    filter: blur(45px);
    animation: rotateBg 14s linear infinite;
    transform-origin: center center;
    transform: scale(1.4);
  }

  .bg2 {
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(ellipse 70% 60% at 30% 20%,  rgba(147,51,234,0.3)  0%, transparent 68%),
      radial-gradient(ellipse 65% 55% at 70% 65%,  rgba(127,29,29,0.25)  0%, transparent 68%),
      radial-gradient(ellipse 75% 65% at 50% 95%,  rgba(88,28,135,0.35)  0%, transparent 68%);
    filter: blur(60px);
    animation: rotateBg 20s linear infinite reverse;
    transform-origin: center center;
    transform: scale(1.4);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 2, 18, 0.45);
  }

  @keyframes rotateBg {
    from { transform: rotate(0deg) scale(1.4); }
    to   { transform: rotate(360deg) scale(1.4); }
  }

  /* ── LOGIN CARD ── */
  .login-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 380px;
    padding: 0 20px;
    opacity: 0;
    animation: floatIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 26px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 40px 36px 36px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 32px 80px rgba(0,0,0,0.5),
      0 0 0 0.5px rgba(255,255,255,0.08) inset;
  }

  /* Línea superior tipo Apple */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  }

  /* ── LOGO / AVATAR ── */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }

  .logo {
    width: 62px; height: 62px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(107,33,168,0.6), rgba(59,7,100,0.8));
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
    box-shadow: 0 8px 24px rgba(107,33,168,0.4);
    position: relative;
  }

  .logo::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  /* ── TITULOS ── */
  .card-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #f2f2f7;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
  }

  .card-sub {
    text-align: center;
    font-size: 13px;
    color: rgba(242,242,247,0.45);
    margin-bottom: 32px;
    letter-spacing: 0.01em;
  }

  /* ── INPUTS ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .input-field {
    position: relative;
  }

  .input-field input {
    width: 100%;
    height: 50px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 13px;
    padding: 0 16px 0 44px;
    font-size: 15px;
    color: #f2f2f7;
    font-family: inherit;
    outline: none;
    transition: all 0.25s ease;
    -webkit-appearance: none;
  }

  .input-field input::placeholder {
    color: rgba(242,242,247,0.3);
  }

  .input-field input:focus {
    background: rgba(255,255,255,0.1);
    border-color: rgba(151,71,255,0.6);
    box-shadow: 0 0 0 3px rgba(107,33,168,0.25);
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
    opacity: 0.5;
  }

  .input-field input:focus ~ .input-focus-ring {
    opacity: 1;
  }

  /* Toggle password */
  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    opacity: 0.4;
    transition: opacity 0.2s;
    padding: 4px;
    color: white;
  }

  .toggle-pw:hover { opacity: 0.8; }

  /* ── OPCIONES ── */
  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .toggle {
    width: 36px; height: 21px;
    background: rgba(255,255,255,0.12);
    border-radius: 100px;
    position: relative;
    transition: background 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 15px; height: 15px;
    background: #ffffff;
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.25,1,0.5,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  #remember-cb { display: none; }

  #remember-cb:checked + .remember .toggle {
    background: #9747ff;
    border-color: rgba(151,71,255,0.4);
  }

  #remember-cb:checked + .remember .toggle-knob {
    transform: translateX(15px);
  }

  .remember-label {
    font-size: 13px;
    color: rgba(242,242,247,0.55);
    user-select: none;
  }

  .forgot {
    font-size: 13px;
    color: rgba(151,71,255,0.9);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .forgot:hover { color: #bf5af2; }

  /* ── BTN PRINCIPAL ── */
  .btn-main {
    width: 100%;
    height: 52px;
    background: linear-gradient(145deg, #7c3aed, #6b21a8);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 8px 24px rgba(107,33,168,0.4);
    margin-bottom: 14px;
  }

  .btn-main::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
    border-radius: 14px 14px 0 0;
  }

  .btn-main:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 12px 32px rgba(107,33,168,0.55);
  }

  .btn-main:active {
    transform: scale(0.98);
    box-shadow: 0 4px 12px rgba(107,33,168,0.3);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .divider-text {
    font-size: 11px;
    color: rgba(242,242,247,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── BTN SECUNDARIO (Face ID / Biometrics) ── */
  .btn-alt {
    width: 100%;
    height: 46px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 13px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(242,242,247,0.75);
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    margin-bottom: 28px;
  }

  .btn-alt:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(151,71,255,0.3);
    color: #f2f2f7;
  }

  /* ── FOOTER CARD ── */
  .card-footer {
    text-align: center;
    font-size: 13px;
    color: rgba(242,242,247,0.35);
  }

  .card-footer a {
    color: rgba(151,71,255,0.9);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .card-footer a:hover { color: #bf5af2; }

  /* ── SEPARADOR DE PÁGINA ── */
  .page-label {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: rgba(242,242,247,0.2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── LINK al CV ── */
  .cv-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
    color: rgba(151,71,255,0.7);
    text-decoration: none;
    transition: color 0.2s;
  }

  .cv-link:hover { color: #bf5af2; }

  /* ── ERROR STATE ── */
  .error-msg {
    display: none;
    background: rgba(255,69,58,0.1);
    border: 1px solid rgba(255,69,58,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ff6b63;
    margin-bottom: 14px;
    text-align: center;
  }

  .error-msg.show { display: block; }
</style>
</head>
<audio id="bgMusic" loop>
  <source src="083 - Bruno Mars - Talking to the Moon.mp3" type="audio/mpeg">
</audio>
<body>

  <!-- FONDO ANIMADO -->
  <div class="bg"></div>
  <div class="bg2"></div>
  <div class="overlay"></div>

  <!-- LOGIN CARD -->
  <div class="login-wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo">Y</div>
      </div>

      <div class="card-title">Bienvenido de nuevo</div>
      <div class="card-sub">Inicia sesión en tu perfil</div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>

      <!-- Inputs -->
      <div class="input-group">
        <div class="input-field">
          <span class="input-icon">✉️</span>
          <input type="text" id="username" placeholder="Usuario o correo" autocomplete="username">
        </div>
        <div class="input-field">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
          <button class="toggle-pw" type="button" id="togglePw">👁</button>
        </div>
      </div>

      <!-- Opciones -->
      <div class="options-row">
        <input type="checkbox" id="remember-cb">
        <label for="remember-cb" class="remember">
          <div class="toggle"><div class="toggle-knob"></div></div>
          <span class="remember-label">Recordarme</span>
        </label>
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón principal -->
      <button class="btn-main" id="loginBtn">Iniciar sesión</button>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">o continúa con</span>
        <div class="divider-line"></div>
      </div>

      <!-- Face ID / Biométrico -->
      <button class="btn-alt">
        <span>🔐</span> Face ID / Touch ID
      </button>

      <!-- Footer -->
      <div class="card-footer">
        ¿No tienes cuenta? <a href="#">Crear perfil</a>
      </div>

    </div>

    <div class="page-label">System Profile · Youstin · 2025</div>
    <a class="cv-link" href="youstin_cv_apple.html">← Ver CV completo</a>
  </div>

<script>
  const audio   = document.getElementById('bgMusic');
const ctx     = new (window.AudioContext || window.webkitAudioContext)();
const source  = ctx.createMediaElementSource(audio);

// — VOLUMEN —
const gainNode = ctx.createGain();
gainNode.gain.value = 0.35; // 0.0 silencio → 1.0 full (ajusta aquí)

// — ECO (Delay + Feedback) —
const delay       = ctx.createDelay();
const feedback    = ctx.createGain();
const dryGain     = ctx.createGain();
const wetGain     = ctx.createGain();

delay.delayTime.value = 0.35;   // segundos entre ecos (0.2 sutil → 0.6 profundo)
feedback.gain.value   = 0.35;  // cuánto se repite (0.1 poco → 0.6 mucho)
dryGain.gain.value    = 1.0;   // señal original
wetGain.gain.value    = 0.2;  // mezcla del eco (0.2 sutil → 0.7 fuerte)

// Cadena: source → dry → gain → destino
//                  ↘ delay → feedback ↗ (loop)
//                           ↘ wet → gain → destino
source.connect(dryGain);
source.connect(delay);
delay.connect(feedback);
feedback.connect(delay);       // loop del feedback
delay.connect(wetGain);

dryGain.connect(gainNode);
wetGain.connect(gainNode);
gainNode.connect(ctx.destination);

// Iniciar al primer click (política del navegador)
document.addEventListener('click', () => {
  if (ctx.state === 'suspended') ctx.resume();
  audio.play();
}, { once: true });

  // Toggle password visibility
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('password');

  togglePw.addEventListener('click', () => {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    togglePw.textContent = isText ? '👁' : '🙈';
  });

  // Login demo (simulated)
  document.getElementById('loginBtn').addEventListener('click', () => {
    const user = document.getElementById('username').value.trim();
    const pw   = document.getElementById('password').value;
    const err  = document.getElementById('errorMsg');

    if (!user || !pw) {
      err.textContent = 'Por favor completa todos los campos.';
      err.classList.add('show');
      return;
    }
if (user === 'youstin' && pw === '1234') {
  document.getElementById('loginBtn').textContent = '✓ Acceso concedido';
  document.getElementById('loginBtn').style.background = 'linear-gradient(145deg,#30d158,#25a244)';
  err.classList.remove('show');

  // Fade out de la música
  const music = document.getElementById('bgMusic');
  const fade = setInterval(() => {
    if (music.volume > 0.05) {
      music.volume -= 0.05;
    } else {
      music.volume = 0;
      clearInterval(fade);
    }
  }, 80);

  setTimeout(() => {
    window.location.href = 'youstin_cv_apple.html';
  }, 1400);
}
////
  
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
</script>

</body>
</html>
